<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile Intelligence</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --btn1:#22c55e;
  --btn2:#0ea5a0;
  --danger:#ef4444;
}
body.dark{
  --bg:#0b1220;
  --card:#0f1a2c;
  --text:#f8fafc;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  background:var(--wa);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{margin:0;font-size:34px;}
.toggle{
  border:2px solid rgba(255,255,255,.75);
  background:transparent;
  color:#fff;
  border-radius:999px;
  padding:8px 18px;
  font-weight:800;
  cursor:pointer;
}

main{
  max-width:900px;
  margin:30px auto;
  padding:0 16px 40px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:26px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.ctaRow{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:14px;
}
.cta{
  border:none;
  border-radius:999px;
  padding:16px 34px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(90deg,var(--btn1),var(--btn2));
  cursor:pointer;
  min-width:220px;
}
.btnDanger{ background:var(--danger); }
.status{
  margin-top:12px;
  text-align:center;
  font-weight:800;
  color:var(--muted);
}
.small{
  font-size:14px;
  color:var(--muted);
  font-weight:700;
  margin-top:10px;
  text-align:center;
}

/* =========================
   HORIZONTAL 7-BAR ACCORDION
   ========================= */
.piWrap{ margin-top:18px; }
.piList{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* IMPORTANT: bars are BUTTONS for reliable WebView tap handling */
.piBar{
  position:relative;
  width:100%;
  border-radius:999px;
  padding:16px 18px 16px 64px;
  min-height:58px;
  cursor:pointer;
  user-select:none;
  box-shadow:0 14px 28px rgba(0,0,0,.10);
  border:2px solid rgba(0,0,0,.14);
  transition: transform .14s ease, filter .14s ease;
  overflow:hidden;

  /* button reset */
  appearance:none;
  -webkit-appearance:none;
  background:transparent;
  font:inherit;
  text-align:left;
}
.piBar:focus{ outline:none; }
body.dark .piBar{ border-color: rgba(255,255,255,.18); }

.piBar.c1{ background:linear-gradient(90deg,#E9DFF2,#E5E1F7); }
.piBar.c2{ background:linear-gradient(90deg,#EFE7D7,#EFEAD9); }
.piBar.c3{ background:linear-gradient(90deg,#A7D7D5,#9DD2D7); }
.piBar.c4{ background:linear-gradient(90deg,#DAD4E9,#D6D2F2); }
.piBar.c5{ background:linear-gradient(90deg,#EFE7D7,#EFEAD9); }
.piBar.c6{ background:linear-gradient(90deg,#A7D7D5,#9DD2D7); }
.piBar.c7{ background:linear-gradient(90deg,#C9B5C9,#CBB9D0); }

.piBar:hover{ filter: brightness(1.02); }
.piBar:active{ transform: scale(.995); }

.piIcon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:22px;
  color:#111827;
  background: rgba(255,255,255,.55);
  box-shadow:0 10px 18px rgba(0,0,0,.10);
  pointer-events:auto;
}

.piTitle{
  font-weight:950;
  font-size:20px;
  letter-spacing:.2px;
  color:#111827;
}

/* Expanded panel */
.piPanel{
  margin-top:12px;
  border-radius:22px;
  background:#0b1020;
  color:#eef2ff;
  padding:18px 18px;
  box-shadow:0 18px 38px rgba(0,0,0,.18);
  display:none;
  overflow:hidden;
  position:relative;
}
body.dark .piPanel{ background:#071022; }

.piPanel:before{
  content:"";
  position:absolute; inset:-30px;
  background:
    radial-gradient(300px 220px at 18% 25%, rgba(34,199,244,.20), rgba(0,0,0,0) 60%),
    radial-gradient(300px 220px at 82% 18%, rgba(246,178,26,.16), rgba(0,0,0,0) 60%),
    radial-gradient(340px 260px at 50% 92%, rgba(37,211,102,.14), rgba(0,0,0,0) 60%);
  pointer-events:none;
}
.piPanel > *{ position:relative; }

.piPanel h3{
  margin:0 0 10px;
  font-size:18px;
  font-weight:950;
}
.piText{
  margin:0;
  font-size:15.5px;
  line-height:1.45;
  opacity:.96;
  white-space:pre-wrap;
}

@media (max-width:520px){
  header h1{ font-size:30px; }
  .piTitle{ font-size:18px; }
  .piBar{ padding:14px 16px 14px 58px; min-height:54px; }
  .piIcon{ left:14px; width:32px; height:32px; }
}
</style>
</head>

<body>
<header>
  <h1>Profile Intelligence</h1>
  <button class="toggle" id="toggleBtn" type="button">Dark</button>
</header>

<main>
  <section class="card" id="introCard" style="display:none;">
    <h2>Visit the client’s LinkedIn profile</h2>
    <p style="margin:8px 0 0;color:var(--muted);font-weight:700;line-height:1.35">
      Open the profile in LinkedIn, scroll a bit so the app can capture text.
      Then return here and tap <b>Get Insights</b>.
    </p>

    <div class="ctaRow">
      <button class="cta" id="goBtn" type="button">Let’s Go!!</button>
    </div>
    <div class="small">App mode is required for auto capture.</div>
  </section>

  <section class="card" id="outCard" style="display:none;">
    <div class="ctaRow">
      <button class="cta" id="insightsBtn" type="button">Get Insights</button>
      <button class="cta btnDanger" id="resetBtn" type="button">Reset</button>
    </div>

    <div class="status" id="status">Open LinkedIn profile and scroll.</div>

    <div class="piWrap">
      <div id="piList" class="piList"></div>
      <div id="piPanel" class="piPanel"></div>
    </div>

    <div class="small" id="debugHint"></div>
  </section>
</main>

<script>
(function(){
  // NOTE: do NOT delete pi_points automatically — you want caching between refresh.
  // If you want fresh every time, uncomment next two lines:
  // try{ localStorage.removeItem('pi_points'); localStorage.removeItem('pi_error'); }catch(e){}

  // Theme
  const body = document.body;
  const toggleBtn = document.getElementById('toggleBtn');
  function applyTheme(t){
    body.classList.toggle('dark', t==='dark');
    localStorage.setItem('theme',t);
    toggleBtn.textContent = t==='dark' ? 'Light' : 'Dark';
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  toggleBtn.onclick = ()=> applyTheme(body.classList.contains('dark') ? 'light' : 'dark');

  // ✅ PLAIN URL ONLY (your current code had markdown here)
  const WORKER_URL = "https://dry-fire-c28e.davidtudu1999.workers.dev";

  // DOM
  const introCard = document.getElementById('introCard');
  const outCard   = document.getElementById('outCard');
  const statusEl  = document.getElementById('status');
  const debugHint = document.getElementById('debugHint');
  const listEl    = document.getElementById('piList');
  const panelEl   = document.getElementById('piPanel');

  function showIntro(){ introCard.style.display=''; outCard.style.display='none'; }
  function showOutput(){ introCard.style.display='none'; outCard.style.display=''; }

  function escapeHtml(str){
    return String(str ?? '')
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  // Capture helpers
  function getCaptured(){
    try{
      if(window.Android && typeof Android.getCapturedProfileText === 'function'){
        const t = (Android.getCapturedProfileText() || '').trim();
        if(t.length > 50){
          localStorage.setItem('pi_captured', t);
          return t;
        }
      }
    }catch(e){}
    return (localStorage.getItem('pi_captured') || '').trim();
  }

  // Android can inject captured text directly
  window.PI_setCapturedText = function(text){
    try{
      const t = (text == null) ? '' : String(text);
      localStorage.setItem('pi_captured', t);
    }catch(e){}
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
    debugHint.textContent = '';
  };

  // Open LinkedIn (plain URL only)
  document.getElementById('goBtn').onclick = () => {
    try{
      if(window.Android && typeof Android.startLinkedInCapture === 'function'){
        Android.startLinkedInCapture(); return;
      }
      if(window.Android && typeof Android.openLinkedIn === 'function'){
        Android.openLinkedIn(); return;
      }
    }catch(e){}
    window.location.href = "https://www.linkedin.com/";
  };

  function normalizeToSections(arr){
    const sections = [];
    if(!Array.isArray(arr)) return sections;

    arr.slice(0,7).forEach((p, i)=>{
      if(typeof p === 'string'){
        const s = p.trim();
        const idx = s.indexOf(':');
        if(idx > 0 && idx < 90){
          const t = s.slice(0, idx).trim();
          const b = s.slice(idx+1).trim();
          sections.push({ title: t || `Heading ${i+1}`, body: b || s });
        }else{
          sections.push({ title: `Heading ${i+1}`, body: s });
        }
        return;
      }

      if(p && typeof p === 'object'){
        // ✅ your paste had p.name turned into a markdown link; keep it simple
        const title = (p.title || p.heading || p.name || `Heading ${i+1}`);
        const body  = (p.body || p.text || p.value || p.description || JSON.stringify(p, null, 2));
        sections.push({ title: String(title), body: String(body) });
        return;
      }

      sections.push({ title: `Heading ${i+1}`, body: String(p) });
    });

    return sections;
  }

  // ✅ WebView-safe accordion renderer
  function renderBars(sections){
    listEl.innerHTML = '';
    panelEl.style.display = 'none';
    panelEl.innerHTML = '';

    if(!Array.isArray(sections) || sections.length === 0){
      panelEl.style.display = '';
      panelEl.innerHTML = `<h3>No insights</h3><p class="piText">No insights returned from Worker.</p>`;
      return;
    }

    const colors = ["c1","c2","c3","c4","c5","c6","c7"];
    let active = -1;

    function setActive(idx){
      // tap same bar => collapse
      active = (active === idx) ? -1 : idx;

      [...listEl.children].forEach((btn, i)=>{
        const icon = btn.querySelector('.piIcon');
        if(icon) icon.textContent = (i === active) ? "–" : "+";
      });

      if(active >= 0){
        panelEl.style.display = '';
        panelEl.innerHTML = `
          <h3>${escapeHtml(sections[active].title || '')}</h3>
          <p class="piText">${escapeHtml(sections[active].body || '')}</p>
        `;
        panelEl.scrollIntoView({behavior:'smooth', block:'nearest'});
      }else{
        panelEl.style.display = 'none';
        panelEl.innerHTML = '';
      }
    }

    sections.slice(0,7).forEach((s, i)=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `piBar ${colors[i] || "c1"}`;
      btn.innerHTML = `
        <span class="piIcon">+</span>
        <span class="piTitle">${escapeHtml(s.title || ('Heading ' + (i+1)))}</span>
      `;

      const handler = (e)=>{ e.preventDefault(); e.stopPropagation(); setActive(i); };

      // click + touchstart (WebView)
      btn.addEventListener('click', handler, {passive:false});
      btn.addEventListener('touchstart', handler, {passive:false});

      // explicit handler on +
      const icon = btn.querySelector('.piIcon');
      if(icon){
        icon.addEventListener('click', handler, {passive:false});
        icon.addEventListener('touchstart', handler, {passive:false});
      }

      listEl.appendChild(btn);
    });

    // ✅ start collapsed (only headings visible)
    setActive(-1);
  }

  async function fetchInsights(text){
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        rawText: text,
        profileText: text,
        capturedText: text
      })
    });

    const raw = await res.text();
    if(!res.ok) throw new Error(raw.slice(0, 400));

    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error("Worker returned non-JSON: " + raw.slice(0, 300)); }

    let pts = data.points ?? data.insights ?? data.result ?? data.output ?? data.message ?? data;

    if(typeof pts === 'string'){
      const lines = pts.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,7);
      return lines.length ? lines : [pts];
    }
    if(Array.isArray(pts)) return pts.slice(0,7);
    if(pts && typeof pts === 'object') return [pts];

    return [];
  }

  document.getElementById('insightsBtn').onclick = async () => {
    const text = getCaptured();
    debugHint.textContent = 'Captured length: ' + text.length;

    if(text.length < 50){
      showIntro();
      statusEl.textContent = 'No captured text found. Open LinkedIn and scroll.';
      return;
    }

    showOutput();
    statusEl.textContent = 'Generating insights…';

    try{
      const pts = await fetchInsights(text);
      localStorage.setItem('pi_points', JSON.stringify(pts));
      statusEl.textContent = 'Ready';

      const sections = normalizeToSections(pts);
      renderBars(sections);
    }catch(e){
      statusEl.textContent = 'Error: ' + (e?.message || e);
      renderBars([]);
    }
  };

  document.getElementById('resetBtn').onclick = () => {
    try{
      localStorage.removeItem('pi_captured');
      localStorage.removeItem('pi_points');
      localStorage.removeItem('pi_error');
    }catch(e){}
    location.reload();
  };

  // Boot (restore last results if available)
  const cached = localStorage.getItem('pi_points');
  if(cached){
    try{
      const pts = JSON.parse(cached);
      showOutput();
      statusEl.textContent = 'Ready';
      const sections = normalizeToSections(pts);
      renderBars(sections);
      return;
    }catch(e){}
  }

  const cap = getCaptured();
  if(cap.length > 50){
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
  }else{
    showIntro();
  }

})();
</script>
</body>
</html>
