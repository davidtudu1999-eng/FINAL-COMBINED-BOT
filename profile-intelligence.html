<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile Intelligence</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --btn1:#22c55e;
  --btn2:#0ea5a0;
  --danger:#ef4444;
}
body.dark{
  --bg:#0b1220;
  --card:#0f1a2c;
  --text:#f8fafc;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  background:var(--wa);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{margin:0;font-size:34px;}
.toggle{
  border:2px solid rgba(255,255,255,.75);
  background:transparent;
  color:#fff;
  border-radius:999px;
  padding:8px 18px;
  font-weight:800;
  cursor:pointer;
}

main{
  max-width:900px;
  margin:30px auto;
  padding:0 16px 40px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:26px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.ctaRow{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:14px;
}
.cta{
  border:none;
  border-radius:999px;
  padding:16px 34px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(90deg,var(--btn1),var(--btn2));
  cursor:pointer;
  min-width:220px;
}
.btnDanger{ background:var(--danger); }
.status{
  margin-top:12px;
  text-align:center;
  font-weight:800;
  color:var(--muted);
}
.small{
  font-size:14px;
  color:var(--muted);
  font-weight:700;
  margin-top:10px;
  text-align:center;
}

/* ===== Accordion list ===== */
.piWrap{ margin-top:18px; }
.piList{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* container for each item (bar + expanded content) */
.piItem{}

/* Use BUTTON for reliable tapping */
.piBar{
  position:relative;
  width:100%;
  border-radius:999px;
  padding:16px 18px 16px 64px;
  min-height:58px;
  user-select:none;
  box-shadow:0 14px 28px rgba(0,0,0,.10);
  border:2px solid rgba(0,0,0,.14);
  overflow:hidden;

  appearance:none;
  -webkit-appearance:none;
  background:transparent;
  font:inherit;
  text-align:left;

  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.piBar:focus{ outline:none; }
body.dark .piBar{ border-color: rgba(255,255,255,.18); }

.piBar.c1{ background:linear-gradient(90deg,#E9DFF2,#E5E1F7); }
.piBar.c2{ background:linear-gradient(90deg,#EFE7D7,#EFEAD9); }
.piBar.c3{ background:linear-gradient(90deg,#A7D7D5,#9DD2D7); }
.piBar.c4{ background:linear-gradient(90deg,#DAD4E9,#D6D2F2); }
.piBar.c5{ background:linear-gradient(90deg,#EFE7D7,#EFEAD9); }
.piBar.c6{ background:linear-gradient(90deg,#A7D7D5,#9DD2D7); }
.piBar.c7{ background:linear-gradient(90deg,#C9B5C9,#CBB9D0); }

.piIcon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
  font-size:22px;
  color:#111827;
  background: rgba(255,255,255,.55);
  box-shadow:0 10px 18px rgba(0,0,0,.10);
  pointer-events:none;
}
.piTitle{
  font-weight:950;
  font-size:20px;
  letter-spacing:.2px;
  color:#111827;
}

/* Expanded content right under the bar */
.piPanel{
  margin-top:10px;
  border-radius:22px;
  background:#0b1020;
  color:#eef2ff;
  padding:18px 18px;
  box-shadow:0 18px 38px rgba(0,0,0,.18);
  display:none;
  overflow:hidden;
  position:relative;
}
body.dark .piPanel{ background:#071022; }
.piPanel:before{
  content:"";
  position:absolute; inset:-30px;
  background:
    radial-gradient(300px 220px at 18% 25%, rgba(34,199,244,.20), rgba(0,0,0,0) 60%),
    radial-gradient(300px 220px at 82% 18%, rgba(246,178,26,.16), rgba(0,0,0,0) 60%),
    radial-gradient(340px 260px at 50% 92%, rgba(37,211,102,.14), rgba(0,0,0,0) 60%);
  pointer-events:none;
}
.piPanel > *{ position:relative; }
.piPanel h3{
  margin:0 0 10px;
  font-size:18px;
  font-weight:950;
}
.piText{
  margin:0;
  font-size:15.5px;
  line-height:1.45;
  opacity:.96;
  white-space:pre-wrap;
}

/* Optional: smooth expand */
.piPanel.open{ display:block; }

@media (max-width:520px){
  header h1{ font-size:30px; }
  .piTitle{ font-size:18px; }
  .piBar{ padding:14px 16px 14px 58px; min-height:54px; }
  .piIcon{ left:14px; width:32px; height:32px; }
}
</style>
</head>

<body>
<header>
  <h1>Profile Intelligence</h1>
  <button class="toggle" id="toggleBtn" type="button">Dark</button>
</header>

<main>
  <section class="card" id="introCard" style="display:none;">
    <h2>Visit the client’s LinkedIn profile</h2>
    <p style="margin:8px 0 0;color:var(--muted);font-weight:700;line-height:1.35">
      Open the profile in LinkedIn, scroll a bit so the app can capture text.
      Then return here and tap <b>Get Insights</b>.
    </p>
    <div class="ctaRow">
      <button class="cta" id="goBtn" type="button">Let’s Go!!</button>
    </div>
    <div class="small">App mode is required for auto capture.</div>
  </section>

  <section class="card" id="outCard" style="display:none;">
    <div class="ctaRow">
      <button class="cta" id="insightsBtn" type="button">Get Insights</button>
      <button class="cta btnDanger" id="resetBtn" type="button">Reset</button>
    </div>

    <div class="status" id="status">Open LinkedIn profile and scroll.</div>

    <div class="piWrap">
      <div id="piList" class="piList"></div>
    </div>

    <div class="small" id="debugHint"></div>
  </section>
</main>

<script>
(function(){
  const body = document.body;
  const toggleBtn = document.getElementById('toggleBtn');
  function applyTheme(t){
    body.classList.toggle('dark', t==='dark');
    localStorage.setItem('theme',t);
    toggleBtn.textContent = t==='dark' ? 'Light' : 'Dark';
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  toggleBtn.onclick = ()=> applyTheme(body.classList.contains('dark') ? 'light' : 'dark');

  const WORKER_URL = "https://dry-fire-c28e.davidtudu1999.workers.dev";

  const introCard = document.getElementById('introCard');
  const outCard   = document.getElementById('outCard');
  const statusEl  = document.getElementById('status');
  const debugHint = document.getElementById('debugHint');
  const listEl    = document.getElementById('piList');

  function showIntro(){ introCard.style.display=''; outCard.style.display='none'; }
  function showOutput(){ introCard.style.display='none'; outCard.style.display=''; }

  function escapeHtml(str){
    return String(str ?? '')
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function getCaptured(){
    try{
      if(window.Android && typeof Android.getCapturedProfileText === 'function'){
        const t = (Android.getCapturedProfileText() || '').trim();
        if(t.length > 45){
          localStorage.setItem('pi_captured', t);
          return t;
        }
      }
    }catch(e){}
    return (localStorage.getItem('pi_captured') || '').trim();
  }

  window.PI_setCapturedText = function(text){
    try{ localStorage.setItem('pi_captured', String(text ?? '')); }catch(e){}
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
    debugHint.textContent = '';
  };

  document.getElementById('goBtn').onclick = () => {
    try{
      if(window.Android && typeof Android.startLinkedInCapture === 'function'){
        Android.startLinkedInCapture(); return;
      }
      if(window.Android && typeof Android.openLinkedIn === 'function'){
        Android.openLinkedIn(); return;
      }
    }catch(e){}
    window.location.href = "https://www.linkedin.com/";
  };

  function normalizeToSections(arr){
    const sections = [];
    if(!Array.isArray(arr)) return sections;
    arr.slice(0,7).forEach((p, i)=>{
      if(typeof p === 'string'){
        const s = p.trim();
        const idx = s.indexOf(':');
        if(idx > 0 && idx < 90){
          sections.push({ title: s.slice(0, idx).trim() || `Heading ${i+1}`, body: s.slice(idx+1).trim() || s });
        }else{
          sections.push({ title: `Heading ${i+1}`, body: s });
        }
        return;
      }
      if(p && typeof p === 'object'){
        const title = (p.title || p.heading || p.name || `Heading ${i+1}`);
        const body  = (p.body || p.text || p.value || p.description || JSON.stringify(p, null, 2));
        sections.push({ title: String(title), body: String(body) });
        return;
      }
      sections.push({ title: `Heading ${i+1}`, body: String(p) });
    });
    return sections;
  }

  let __active = -1;

  function renderBars(sections){
    listEl.innerHTML = '';
    __active = -1;

    if(!sections || !sections.length){
      listEl.innerHTML = '';
      statusEl.textContent = 'No insights returned.';
      return;
    }

    const colors = ["c1","c2","c3","c4","c5","c6","c7"];

    sections.slice(0,7).forEach((s, i)=>{
      const item = document.createElement('div');
      item.className = 'piItem';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `piBar ${colors[i] || "c1"}`;
      btn.setAttribute('data-idx', String(i));
      btn.innerHTML = `
        <span class="piIcon">+</span>
        <span class="piTitle">${escapeHtml(s.title || ('Heading ' + (i+1)))}</span>
      `;

      const panel = document.createElement('div');
      panel.className = 'piPanel';
      panel.innerHTML = `
        <h3>${escapeHtml(s.title || '')}</h3>
        <p class="piText">${escapeHtml(s.body || '')}</p>
      `;

      item.appendChild(btn);
      item.appendChild(panel);
      listEl.appendChild(item);
    });
  }

  // ✅ MIUI-safe event delegation (open one at a time)
  function handleTap(ev){
    const bar = ev.target && ev.target.closest ? ev.target.closest('.piBar') : null;
    if(!bar) return;

    ev.preventDefault();
    ev.stopPropagation();

    const idx = Number(bar.getAttribute('data-idx'));
    if(Number.isNaN(idx)) return;

    statusEl.textContent = `Tapped: ${idx+1}`;

    const items = Array.from(listEl.querySelectorAll('.piItem'));
    items.forEach((it, i)=>{
      const b = it.querySelector('.piBar');
      const icon = it.querySelector('.piIcon');
      const p = it.querySelector('.piPanel');

      if(i === idx){
        const isOpen = p.classList.contains('open');
        // close all first
        items.forEach(x=>{
          const pp = x.querySelector('.piPanel'); if(pp) pp.classList.remove('open');
          const ii = x.querySelector('.piIcon'); if(ii) ii.textContent = '+';
        });
        // toggle this one
        if(!isOpen){
          p.classList.add('open');
          if(icon) icon.textContent = '–';
          setTimeout(()=> p.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
        } else {
          if(icon) icon.textContent = '+';
        }
      }
    });
  }

  listEl.addEventListener('pointerup', handleTap, {passive:false});
  listEl.addEventListener('touchend', handleTap, {passive:false});
  listEl.addEventListener('click', handleTap, {passive:false});

  async function fetchInsights(text){
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ rawText:text, profileText:text, capturedText:text })
    });

    const raw = await res.text();
    if(!res.ok) throw new Error(raw.slice(0, 400));

    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error("Worker returned non-JSON: " + raw.slice(0, 300)); }

    let pts = data.points ?? data.insights ?? data.result ?? data.output ?? data.message ?? data;
    if(typeof pts === 'string'){
      const lines = pts.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,7);
      return lines.length ? lines : [pts];
    }
    if(Array.isArray(pts)) return pts.slice(0,7);
    if(pts && typeof pts === 'object') return [pts];
    return [];
  }

  document.getElementById('insightsBtn').onclick = async () => {
    const text = getCaptured();
    debugHint.textContent = 'Captured length: ' + text.length;

    if(text.length < 50){
      showIntro();
      statusEl.textContent = 'No captured text found. Open LinkedIn and scroll.';
      return;
    }

    showOutput();
    statusEl.textContent = 'Generating insights…';

    try{
      const pts = await fetchInsights(text);
      localStorage.setItem('pi_points', JSON.stringify(pts));
      statusEl.textContent = 'Ready';
      renderBars(normalizeToSections(pts));
    }catch(e){
      statusEl.textContent = 'Error: ' + (e?.message || e);
      renderBars([]);
    }
  };

  document.getElementById('resetBtn').onclick = () => {
    try{
      localStorage.removeItem('pi_captured');
      localStorage.removeItem('pi_points');
      localStorage.removeItem('pi_error');
    }catch(e){}
    location.reload();
  };

  // Boot
  const cached = localStorage.getItem('pi_points');
  if(cached){
    try{
      const pts = JSON.parse(cached);
      showOutput();
      statusEl.textContent = 'Ready';
      renderBars(normalizeToSections(pts));
      return;
    }catch(e){}
  }

  const cap = getCaptured();
  if(cap.length > 50){
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
  }else{
    showIntro();
  }
})();
</script>

</body>
</html>
