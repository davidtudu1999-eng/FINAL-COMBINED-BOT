<!DOCTYPE html>
<html>
<head>
    <title>Profile Intelligence</title>
    <script>
        // Function to call the worker and capture the text
        function callWorker() {
            if (window.Worker) {
                const worker = new Worker('worker.js');
                worker.onmessage = function(event) {
                    const insights = event.data;
                    displayInsights(insights);
                };
                worker.postMessage('Start processing');
            } else {
                console.error('Your browser does not support web workers.');
            }
        }

        // Function to display insights
        function displayInsights(insights) {
            const insightsContainer = document.getElementById('insights');
            insightsContainer.innerHTML = '';
            insights.forEach(insight => {
                const insightItem = document.createElement('div');
                insightItem.textContent = insight;
                insightsContainer.appendChild(insightItem);
            });
        }

        // Load the worker when the page loads
        window.onload = function() {
            callWorker();
        };
    </script>
</head>
<body>
    <h1>Profile Intelligence</h1>
    <div id="insights"></div>
</body>
</html>
