<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile Intelligence</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --btn1:#22c55e;
  --btn2:#0ea5a0;
}
body.dark{
  --bg:#0b1220;
  --card:#0f1a2c;
  --text:#f8fafc;
  --muted:#94a3b8;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  background:var(--wa);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
}
header h1{margin:0;font-size:34px;}
.toggle{
  border:2px solid #fff;
  background:transparent;
  color:#fff;
  border-radius:999px;
  padding:8px 18px;
  font-weight:800;
  cursor:pointer;
}
main{
  max-width:900px;
  margin:30px auto;
  padding:0 16px 40px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:26px;
}
.cta{
  border:none;
  border-radius:999px;
  padding:16px 40px;
  font-size:22px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(90deg,var(--btn1),var(--btn2));
  cursor:pointer;
}
.status{
  margin-top:10px;
  text-align:center;
  font-weight:800;
  color:var(--muted);
}
.points{
  margin-top:16px;
  list-style:none;
  padding:0;
}
.point{
  background:rgba(34,197,94,.12);
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  font-weight:700;
}
</style>
</head>

<body>

<header>
  <h1>Profile Intelligence</h1>
  <button class="toggle" id="toggleBtn">Dark</button>
</header>

<main>

<section class="card" id="introCard">
  <h2>Visit the client’s LinkedIn profile.</h2>
  <p>Scroll a bit after opening. Then come back and tap Get Insights.</p>
  <br/>
  <button class="cta" id="goBtn">Let’s Go!!</button>
</section>

<section class="card" id="outCard" style="display:none;">
  <button class="cta" id="insightsBtn">Get Insights</button>
  <div class="status" id="status">Open LinkedIn profile and scroll.</div>
  <ul class="points" id="points"></ul>
</section>

</main>

<script>
(function(){

// ---------- Theme ----------
const body = document.body;
const toggleBtn = document.getElementById('toggleBtn');
function applyTheme(t){
  body.classList.toggle('dark', t==='dark');
  localStorage.setItem('theme',t);
  toggleBtn.textContent = t==='dark'?'Light':'Dark';
}
applyTheme(localStorage.getItem('theme')||'light');
toggleBtn.onclick=()=>applyTheme(body.classList.contains('dark')?'light':'dark');

// ---------- Worker URL ----------
const WORKER_URL="https://dry-fire-c28e.davidtudu1999.workers.dev";

// ---------- Android capture getter ----------
function getCaptured(){
  try{
    if(window.Android && Android.getCapturedProfileText){
      const t=Android.getCapturedProfileText()||'';
      if(t.length>100){
        localStorage.setItem('pi_captured',t);
        return t;
      }
    }
  }catch(e){}
  return localStorage.getItem('pi_captured')||'';
}

// Android injection support
window.PI_setCapturedText=function(text){
  localStorage.setItem('pi_captured',text||'');
  showOutput();
  document.getElementById('status').textContent='Captured. Tap Get Insights.';
};

// ---------- Views ----------
const intro=document.getElementById('introCard');
const out=document.getElementById('outCard');
const statusEl=document.getElementById('status');
const pointsEl=document.getElementById('points');

function showOutput(){
  intro.style.display='none';
  out.style.display='';
}

// ---------- Open LinkedIn ----------
document.getElementById('goBtn').onclick=()=>{
  if(window.Android && Android.startLinkedInCapture){
    Android.startLinkedInCapture();
  }else{
    window.open("https://www.linkedin.com/","_blank");
  }
};

// ---------- Render ----------
function renderPoints(arr){
  pointsEl.innerHTML='';
  if(!Array.isArray(arr)||!arr.length){
    pointsEl.innerHTML='<li class="point">No insights returned from Worker.</li>';
    return;
  }
  arr.forEach((p,i)=>{
    const li=document.createElement('li');
    li.className='point';
    li.textContent=(i+1)+') '+(typeof p==='string'?p:(p.body||p.text||JSON.stringify(p)));
    pointsEl.appendChild(li);
  });
}

// ---------- Worker call ----------
async function fetchInsights(text){
  const res=await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    // ✅ IMPORTANT FIX: send keys your Worker expects
    body: JSON.stringify({
      rawText: text,
      profileText: text,
      capturedText: text
    })
  });

  const raw=await res.text();
  if(!res.ok) throw new Error(raw.slice(0,400));

  let data;
  try{ data=JSON.parse(raw); }
  catch(e){ throw new Error("Worker returned non JSON: "+raw.slice(0,300)); }

  let pts=data.points ?? data.insights ?? data.result ?? data.output ?? data.message ?? data;

  if(typeof pts==='string'){
    pts=pts.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,7);
  }
  if(Array.isArray(pts) && pts.length && typeof pts[0]==='string'){
    return pts.slice(0,7);
  }
  if(Array.isArray(pts)){
    return pts.slice(0,7).map(x=> (typeof x==='string' ? x : (x.body||x.text||JSON.stringify(x))));
  }
  if(pts && typeof pts==='object'){
    return [JSON.stringify(pts)];
  }
  return [];
}

// ---------- Get Insights ----------
document.getElementById('insightsBtn').onclick=async()=>{
  const text=getCaptured();
  alert("Captured length: "+text.length);

  if(text.length<50){
    statusEl.textContent='No captured text found.';
    return;
  }

  showOutput();
  statusEl.textContent='Generating insights...';
  try{
    const pts=await fetchInsights(text);
    statusEl.textContent='Ready';
    renderPoints(pts);
  }catch(e){
    statusEl.textContent='Error: '+(e.message||e);
    renderPoints([]);
  }
};

// ---------- Boot ----------
const existing=getCaptured();
if(existing.length>50){
  showOutput();
}

})();
</script>

</body>
</html>
