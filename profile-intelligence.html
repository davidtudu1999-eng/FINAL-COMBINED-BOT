<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile Intelligence</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --btn1:#22c55e;
  --btn2:#0ea5a0;
  --danger:#ef4444;
}
body.dark{
  --bg:#0b1220;
  --card:#0f1a2c;
  --text:#f8fafc;
  --muted:#94a3b8;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  background:var(--wa);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
header h1{margin:0;font-size:34px;}
.toggle{
  border:2px solid rgba(255,255,255,.75);
  background:transparent;
  color:#fff;
  border-radius:999px;
  padding:8px 18px;
  font-weight:800;
  cursor:pointer;
}
main{
  max-width:900px;
  margin:30px auto;
  padding:0 16px 40px;
}
.card{
  background:var(--card);
  border-radius:20px;
  padding:26px;
  box-shadow:0 10px 30px rgba(0,0,0,.12);
}
.ctaRow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
.cta{
  border:none;
  border-radius:999px;
  padding:16px 34px;
  font-size:20px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(90deg,var(--btn1),var(--btn2));
  cursor:pointer;
  min-width:220px;
}
.btnDanger{ background:var(--danger); }
.status{
  margin-top:12px;
  text-align:center;
  font-weight:800;
  color:var(--muted);
}
.small{font-size:14px;color:var(--muted);font-weight:700;margin-top:10px;text-align:center}

/* =========================
   Premium 7-bar Accordion UI
   ========================= */
.piWrap{
  margin-top:18px;
}

.piBars{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:stretch;
  flex-wrap:nowrap;
  overflow-x:auto;
  padding:10px 6px 14px;
  -webkit-overflow-scrolling:touch;
}

.piBar{
  position:relative;
  border:0;
  cursor:pointer;
  min-width:84px;
  width:92px;
  height:320px;
  border-radius:34px;
  color:#0b1220;
  box-shadow:
    0 18px 40px rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.30);
  transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  outline:none;
  user-select:none;
}
.piBar:active{ transform: scale(.99); }
.piBar:hover{ filter: brightness(1.02); }

.piPlus{
  position:absolute;
  top:14px; left:14px;
  width:34px; height:34px;
  border-radius:999px;
  display:grid;
  place-items:center;
  font-weight:950;
  font-size:20px;
  background: rgba(255,255,255,.55);
  box-shadow: 0 10px 18px rgba(0,0,0,.10);
}

.piTitle{
  font-weight:950;
  font-size:18px;
  letter-spacing:.2px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  opacity:.95;
  text-align:center;
  padding:18px 0;
}

.piBar.active{
  transform: translateY(-4px);
  box-shadow:
    0 24px 54px rgba(0,0,0,.18),
    inset 0 0 0 1px rgba(255,255,255,.40);
}
.piBar.active .piPlus{ background: rgba(255,255,255,.82); }

/* 7 premium colors */
.c1{ background: linear-gradient(180deg,#E8E7FF,#D6D2FF); } /* lavender */
.c2{ background: linear-gradient(180deg,#E8FFF6,#BFF3DE); } /* mint */
.c3{ background: linear-gradient(180deg,#FFF3E6,#FFD3A8); } /* sand */
.c4{ background: linear-gradient(180deg,#E7F1FF,#BFD9FF); } /* sky */
.c5{ background: linear-gradient(180deg,#FFF0F6,#FFC6D9); } /* rose */
.c6{ background: linear-gradient(180deg,#F1FFF0,#D5F8C8); } /* sage */
.c7{ background: linear-gradient(180deg,#F6F7FB,#DDE2F3); } /* slate */

/* Expanded panel (below) */
.piPanel{
  background: #0b1020;
  color:#eef2ff;
  border-radius:22px;
  padding:16px 16px;
  box-shadow:0 18px 40px rgba(0,0,0,.18);
  margin: 6px 6px 8px;
  position:relative;
  overflow:hidden;
}
body.dark .piPanel{
  background:#071022;
}
.piPanel:before{
  content:"";
  position:absolute; inset:-30px;
  background:
    radial-gradient(280px 220px at 20% 20%, rgba(34,199,244,.22), rgba(0,0,0,0) 60%),
    radial-gradient(320px 260px at 85% 10%, rgba(246,178,26,.18), rgba(0,0,0,0) 60%),
    radial-gradient(360px 280px at 55% 95%, rgba(37,211,102,.14), rgba(0,0,0,0) 60%);
  pointer-events:none;
}
.piPanel > *{ position:relative; }

.piPanel h3{
  margin:0 0 10px;
  font-size:18px;
  font-weight:950;
  letter-spacing:.2px;
}
.piText{
  font-size:15.5px;
  line-height:1.45;
  opacity:.95;
  white-space:pre-wrap;
}

/* Mobile: show bars as horizontal pills (still same behavior) */
@media (max-width: 520px){
  .piBar{
    height:56px;
    width:auto;
    min-width:240px;
    border-radius:999px;
    justify-content:flex-start;
    padding-left:62px;
  }
  .piTitle{
    writing-mode:initial;
    transform:none;
    padding:0;
    text-align:left;
    font-size:16px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Profile Intelligence</h1>
  <button class="toggle" id="toggleBtn" type="button">Dark</button>
</header>

<main>

<section class="card" id="introCard" style="display:none;">
  <h2>Visit the client’s LinkedIn profile</h2>
  <p style="margin:8px 0 0;color:var(--muted);font-weight:700;line-height:1.35">
    Open the profile in LinkedIn, scroll a bit so the app can capture text.
    Then return here and tap <b>Get Insights</b>.
  </p>

  <div class="ctaRow">
    <button class="cta" id="goBtn" type="button">Let’s Go!!</button>
  </div>

  <div class="small">App mode is required for auto capture.</div>
</section>

<section class="card" id="outCard" style="display:none;">
  <div class="ctaRow">
    <button class="cta" id="insightsBtn" type="button">Get Insights</button>
    <button class="cta btnDanger" id="resetBtn" type="button">Reset</button>
  </div>

  <div class="status" id="status">Open LinkedIn profile and scroll.</div>

  <!-- NEW OUTPUT UI -->
  <div class="piWrap">
    <div id="piBars" class="piBars"></div>
    <div id="piPanel" class="piPanel" style="display:none;"></div>
  </div>

  <div class="small" id="debugHint"></div>
</section>

</main>

<script>
(function(){
  // ---------- HARD RESET OF OLD STATE (prevents “stuck error”) ----------
  try{
    localStorage.removeItem('pi_points');
    localStorage.removeItem('pi_error');
  }catch(e){}

  // ---------- Theme ----------
  const body = document.body;
  const toggleBtn = document.getElementById('toggleBtn');
  function applyTheme(t){
    body.classList.toggle('dark', t==='dark');
    localStorage.setItem('theme',t);
    toggleBtn.textContent = t==='dark'?'Light':'Dark';
  }
  applyTheme(localStorage.getItem('theme')||'light');
  toggleBtn.onclick=()=>applyTheme(body.classList.contains('dark')?'light':'dark');

  // ---------- Worker URL ----------
  const WORKER_URL = "https://dry-fire-c28e.davidtudu1999.workers.dev";

  // ---------- DOM ----------
  const introCard = document.getElementById('introCard');
  const outCard   = document.getElementById('outCard');
  const statusEl  = document.getElementById('status');
  const debugHint = document.getElementById('debugHint');

  function showIntro(){ introCard.style.display=''; outCard.style.display='none'; }
  function showOutput(){ introCard.style.display='none'; outCard.style.display=''; }

  // ---------- Capture helpers ----------
  function getCaptured(){
    try{
      if(window.Android && typeof Android.getCapturedProfileText === 'function'){
        const t = (Android.getCapturedProfileText() || '').trim();
        if(t.length > 50){
          localStorage.setItem('pi_captured', t);
          return t;
        }
      }
    }catch(e){}
    return (localStorage.getItem('pi_captured') || '').trim();
  }

  // Android can directly inject captured text
  window.PI_setCapturedText = function(text){
    try{
      const t = (text == null) ? '' : String(text);
      localStorage.setItem('pi_captured', t);
    }catch(e){}
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
    debugHint.textContent = '';
  };

  // ---------- Open LinkedIn ----------
  document.getElementById('goBtn').onclick = () => {
    try{
      if(window.Android && typeof Android.startLinkedInCapture === 'function'){
        Android.startLinkedInCapture(); return;
      }
      if(window.Android && typeof Android.openLinkedIn === 'function'){
        Android.openLinkedIn(); return;
      }
    }catch(e){}
    window.location.href = "https://www.linkedin.com/";
  };

  // ---------- Premium 7-bar renderer ----------
  function escapeHtml(str){
    return String(str ?? '')
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function normalizeToSections(arr){
    const sections = [];
    if(!Array.isArray(arr)) return sections;

    arr.slice(0,7).forEach((p, i)=>{
      // string point: try split "Heading: body"
      if(typeof p === 'string'){
        const s = p.trim();
        const idx = s.indexOf(':');
        if(idx > 0 && idx < 80){
          const t = s.slice(0, idx).trim();
          const b = s.slice(idx+1).trim();
          sections.push({ title: t || `Heading ${i+1}`, body: b || s });
        }else{
          sections.push({ title: `Heading ${i+1}`, body: s });
        }
        return;
      }

      // object point
      if(p && typeof p === 'object'){
        const title = (p.title || p.heading || p.name || `Heading ${i+1}`);
        const body  = (p.body || p.text || p.value || p.description || JSON.stringify(p, null, 2));
        sections.push({ title: String(title), body: String(body) });
        return;
      }

      // fallback
      sections.push({ title: `Heading ${i+1}`, body: String(p) });
    });

    return sections;
  }

  function renderBars(sections){
    const barsEl = document.getElementById('piBars');
    const panelEl = document.getElementById('piPanel');
    if(!barsEl || !panelEl) return;

    barsEl.innerHTML = '';
    panelEl.style.display = 'none';
    panelEl.innerHTML = '';

    if(!Array.isArray(sections) || sections.length === 0){
      panelEl.style.display = '';
      panelEl.innerHTML = `<h3>No insights</h3><div class="piText">No insights returned from Worker.</div>`;
      return;
    }

    const colorClasses = ["c1","c2","c3","c4","c5","c6","c7"];
    let active = -1;

    function setActive(idx){
      active = idx;

      [...barsEl.children].forEach((btn, i)=>{
        btn.classList.toggle('active', i===active);
        const plus = btn.querySelector('.piPlus');
        if(plus) plus.textContent = (i===active) ? "–" : "+";
        btn.setAttribute('aria-expanded', (i===active) ? 'true' : 'false');
      });

      if(active >= 0){
        panelEl.style.display = '';
        panelEl.innerHTML = `
          <h3>${escapeHtml(sections[active].title || '')}</h3>
          <div class="piText">${escapeHtml(sections[active].body || '')}</div>
        `;
        // scroll panel into view nicely (mobile friendly)
        panelEl.scrollIntoView({behavior:'smooth', block:'start'});
      }else{
        panelEl.style.display = 'none';
        panelEl.innerHTML = '';
      }
    }

    sections.slice(0,7).forEach((s, i)=>{
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `piBar ${colorClasses[i] || 'c1'}`;
      btn.setAttribute('aria-expanded','false');
      btn.innerHTML = `
        <div class="piPlus">+</div>
        <div class="piTitle">${escapeHtml(s.title || ('Heading ' + (i+1)))}</div>
      `;
      btn.onclick = ()=> setActive(i); // only one open at a time
      barsEl.appendChild(btn);
    });

    // Default: open the first section
    setActive(0);
  }

  // ---------- Worker call ----------
  async function fetchInsights(text){
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        rawText: text,
        profileText: text,
        capturedText: text
      })
    });

    const raw = await res.text();

    if(!res.ok){
      throw new Error(raw.slice(0, 400));
    }

    let data;
    try{
      data = JSON.parse(raw);
    }catch(e){
      throw new Error("Worker returned non-JSON: " + raw.slice(0, 300));
    }

    let pts = data.points ?? data.insights ?? data.result ?? data.output ?? data.message ?? data;

    if(typeof pts === 'string'){
      const lines = pts.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,7);
      return lines.length ? lines : [pts];
    }

    if(Array.isArray(pts) && pts.length && typeof pts[0] === 'string'){
      return pts.slice(0,7);
    }

    if(Array.isArray(pts)){
      return pts.slice(0,7);
    }

    if(pts && typeof pts === 'object'){
      return [pts];
    }

    return [];
  }

  // ---------- Buttons ----------
  document.getElementById('insightsBtn').onclick = async () => {
    const text = getCaptured();
    debugHint.textContent = 'Captured length: ' + text.length;

    if(text.length < 50){
      showIntro();
      statusEl.textContent = 'No captured text found. Open LinkedIn and scroll.';
      return;
    }

    showOutput();
    statusEl.textContent = 'Generating insights…';

    try{
      const pts = await fetchInsights(text);
      localStorage.setItem('pi_points', JSON.stringify(pts));
      statusEl.textContent = 'Ready';
      const sections = normalizeToSections(pts);
      renderBars(sections);
    }catch(e){
      statusEl.textContent = 'Error: ' + (e?.message || e);
      renderBars([]);
    }
  };

  document.getElementById('resetBtn').onclick = () => {
    try{
      localStorage.removeItem('pi_captured');
      localStorage.removeItem('pi_points');
      localStorage.removeItem('pi_error');
    }catch(e){}
    location.reload();
  };

  // ---------- Boot ----------
  const cached = localStorage.getItem('pi_points');
  if(cached){
    try{
      const pts = JSON.parse(cached);
      showOutput();
      statusEl.textContent = 'Ready';
      const sections = normalizeToSections(pts);
      renderBars(sections);
      return;
    }catch(e){}
  }

  const cap = getCaptured();
  if(cap.length > 50){
    showOutput();
    statusEl.textContent = 'Captured. Tap “Get Insights”.';
  }else{
    showIntro();
  }

})();
</script>

</body>
</html>
